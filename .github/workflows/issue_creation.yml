name: Create Monday.com Issue

on:
  repository_dispatch:
    types: [monday_issue]
  workflow_dispatch:
    inputs:
      title:
        description: 'Manual Title'
        required: true
      body:
        description: 'Manual Body'
        required: true

jobs:
  create_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            // Accessing the specific Monday.com structure: client_payload -> payload -> boardId
            const mondayData = context.payload.client_payload?.payload;
            
            // Fallback for Manual Triggers (workflow_dispatch)
            const title = context.payload.inputs?.title || `New Task from Monday Board ${mondayData?.boardId}`;
            const body = context.payload.inputs?.body || `Automated issue created.\n- **Board ID**: ${mondayData?.boardId}\n- **Side**: ${mondayData?.side}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['copilot', 'monday-integration']
            });
